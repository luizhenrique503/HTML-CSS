<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vídeos em HTML5</title>
</head>
<body>
    <h1>Inserindo vídeos em hospedados localmente</h1>
    <p>este vídeo está hospedado no meu próprio servidor</p>
<video width="500" controls loop>
<source src="midea/meu-video.mp4" type="video/mp4">
<source src="midea/Meu-Video.webm" type="video/mp4">
<p>seu navegador não tem compatibilidade com reprodução de videos</p>
</video>
<h1>Inserindo vídeos do youtube</h1>
<iframe width="560" height="315" src="https://www.youtube.com/embed/jPWsBuiy1rE?si=XV10qiKtTl03Sw9d" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
</body>
</html>
