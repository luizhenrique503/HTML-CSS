<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mídeas em HTML5</title>
</head>
<body>
 <h1>imagem dinamica</h1>
 <p>Tente abrir esse site em varios dispositivos diferentes ou simplesmente aumente e diminua o tamanho do seu navegador.</p>
 <picture>
    <source media="(max-width: 750px)" srcset="imagens/hugo.png" type="image/png">
  <source media="(max-width: 1050px)" srcset="" type="image/png">
  <img src="imagens/yuri.png" alt="imagem flexível">
 </picture>
 
 <h1>reproduzindo Áudio</h1>
 <p>vamos aprender a reproduzir áudios em HTML5.</p>
<audio preload="metadata" autoplay controls loop>
   <source src="midea/guanacast-33.mp3" type="audio/mpeg">
   <source src="midea/guanacast-33.ogg" type="audio/ogg">
   <source src="midea/guanacast-33.wav" type="audio/wav">
   <p>Infelizmente seu navegador não consegue reproduzir  áudio <a href="midea/guanacast-33.mp3">clique aqui para baixar o arquivo MP3</a> </p>
  </audio>
</body>
</html>
